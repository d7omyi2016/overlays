<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Badge Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 320px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px 10px 20px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 50%, rgba(76,175,80,0.08) 1px, transparent 1px),
      radial-gradient(circle at 80% 30%, rgba(129,199,132,0.06) 1px, transparent 1px),
      linear-gradient(135deg, #1a2e1a 0%, #0f1f0f 40%, #1e3320 100%);
    background-size: 4px 4px, 6px 6px, 100% 100%;
    border-top: 2px solid #4caf50;
    border-right: 1px solid #2e7d32;
    border-bottom: 1px solid #2e7d32;
    border-radius: 0 0 8px 0;
    box-shadow:
      4px 4px 20px rgba(0,0,0,0.6),
      0 0 30px rgba(76,175,80,0.15);

    animation: wipeIn 1.2s cubic-bezier(0.77,0,0.18,1) forwards;
    clip-path: inset(0 100% 0 0);
  }

  @keyframes wipeIn {
    0%   { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0% 0 0); }
  }

  .badge::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #66bb6a, #a5d6a7, #66bb6a, transparent);
    animation: glowLine 3s ease-in-out infinite;
  }

  @keyframes glowLine {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; filter: blur(0.5px); }
  }

  /* توهج يمر من اليمين لليسار */
  .badge::after {
    content: '';
    position: absolute;
    top: 0;
    right: 110%;
    width: 60px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), rgba(200,255,200,0.22), rgba(255,255,255,0.18), transparent);
    transform: skewX(-15deg);
    animation: sweepGlow 3s ease-in-out infinite;
    animation-delay: 1.5s;
  }

  @keyframes sweepGlow {
    0%   { right: 110%; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { right: -80px; opacity: 0; }
  }

  .live-dot {
    width: 10px;
    height: 10px;
    background: #4caf50;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px #4caf50, 0 0 18px rgba(76,175,80,0.7);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 8px #4caf50, 0 0 16px rgba(76,175,80,0.6); }
    50% { transform: scale(1.35); box-shadow: 0 0 14px #66bb6a, 0 0 30px rgba(76,175,80,0.9); }
  }

  .account-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.25;
  }

  .account-label {
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #81c784;
    letter-spacing: 1px;
    opacity: 0.9;
  }

  .account-name {
    font-family: 'Cairo', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #e8f5e9;
    letter-spacing: 1px;
    text-shadow:
      0 0 10px rgba(76,175,80,0.9),
      0 0 22px rgba(76,175,80,0.5),
      0 0 44px rgba(76,175,80,0.2);
    animation: nameGlow 2s ease-in-out infinite alternate;
  }

  @keyframes nameGlow {
    from { text-shadow: 0 0 8px rgba(76,175,80,0.7), 0 0 16px rgba(76,175,80,0.3); }
    to   { text-shadow: 0 0 16px rgba(129,199,132,1), 0 0 32px rgba(76,175,80,0.7), 0 0 55px rgba(76,175,80,0.3); }
  }
</style>
</head>
<body>
<div class="badge">
  <div class="live-dot"></div>
  <div class="account-info">
    <span class="account-label">حسابي على الكيك</span>
    <span class="account-name">iD7mmmy</span>
  </div>
</div>
</body>
</html>
