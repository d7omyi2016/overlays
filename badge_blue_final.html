<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Badge Blue</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    width: 340px;
    height: 75px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 22px 10px 18px;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    background:
      radial-gradient(circle at 15% 50%, rgba(33,150,243,0.10) 1px, transparent 1px),
      radial-gradient(circle at 75% 25%, rgba(100,181,246,0.07) 1px, transparent 1px),
      linear-gradient(135deg, #0d1e36 0%, #071428 40%, #102244 100%);
    background-size: 4px 4px, 6px 6px, 100% 100%;
    border-top: 2px solid #2196f3;
    border-right: 1px solid #1565c0;
    border-bottom: 1px solid #1565c0;
    box-shadow:
      4px 4px 24px rgba(0,0,0,0.7),
      0 0 40px rgba(33,150,243,0.15);
    animation: wipeIn 1.3s cubic-bezier(0.77,0,0.18,1) forwards;
    clip-path: inset(0 100% 0 0);
  }
  @keyframes wipeIn {
    0%   { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0% 0 0); }
  }
  .badge::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(100,181,246,0.35), transparent);
    animation: sweepGlow 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sweepGlow {
    0%   { right: 110%; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { right: -60px; opacity: 0; }
  }
  .badge::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #42a5f5, #90caf9, #42a5f5, transparent);
    animation: glowLine 2.5s ease-in-out infinite;
  }
  @keyframes glowLine {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; filter: blur(0.5px); }
  }
  .live-dot {
    width: 10px;
    height: 10px;
    background: #2196f3;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px #2196f3, 0 0 20px rgba(33,150,243,0.8);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1);   box-shadow: 0 0 8px #2196f3, 0 0 18px rgba(33,150,243,0.7); }
    50%       { transform: scale(1.4); box-shadow: 0 0 14px #64b5f6, 0 0 32px rgba(33,150,243,1); }
  }
  .text-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
  }
  .label-main {
    font-family: 'Cairo', sans-serif;
    font-size: 17px;
    font-weight: 900;
    color: #e3f2fd;
    letter-spacing: 0.5px;
    animation: nameGlow 2s ease-in-out infinite alternate;
  }
  @keyframes nameGlow {
    from { text-shadow: 0 0 8px rgba(33,150,243,0.8), 0 0 18px rgba(33,150,243,0.4); }
    to   { text-shadow: 0 0 16px rgba(100,181,246,1), 0 0 34px rgba(33,150,243,0.8), 0 0 60px rgba(33,150,243,0.3); }
  }
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #2196f3, #90caf9, #2196f3);
    opacity: 0.5;
  }
  .label-sub {
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #64b5f6;
    letter-spacing: 1px;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="badge">
  <div class="live-dot"></div>
  <div class="text-wrap">
    <span class="label-main">كبس = يطلع اسمك</span>
    <div class="divider"></div>
    <span class="label-sub">لازم فولو</span>
  </div>
</div>
</body>
</html>
